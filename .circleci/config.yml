version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/ruby:3.3
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "Gemfile.lock" }}
            - v1-dependencies-
      - run:
          name: Configure bundle path
          command: bundle config set --local path 'vendor/bundle'
      - run:
          name: Install dependencies
          command: bundle install --jobs=4 --retry=3
      - save_cache:
          paths:
            - ./vendor/bundle
          key: v1-dependencies-{{ checksum "Gemfile.lock" }}
      - run:
          name: Run Rubocop
          command: bundle exec rubocop

  test:
    parameters:
      ruby-version:
        type: string
    docker:
      - image: cimg/ruby:<< parameters.ruby-version >>
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "Gemfile.lock" }}
            - v1-dependencies-
      - run:
          name: Configure bundle path
          command: bundle config set --local path 'vendor/bundle'
      - run:
          name: Install dependencies
          command: bundle install --jobs=4 --retry=3
      - save_cache:
          paths:
            - ./vendor/bundle
          key: v1-dependencies-{{ checksum "Gemfile.lock" }}
      - run:
          name: Run RSpec
          command: bundle exec rspec

workflows:
  build-and-test:
    jobs:
      - lint
      - test:
          requires:
            - lint
          matrix:
            parameters:
              ruby-version:
                - "3.0"
                - "3.1"
                - "3.2"
                - "3.3"
